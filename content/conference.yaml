tracks:
  - title: "Vehicle-to-grid integration"
    body: "Managed charging, bidirectional power flow, and control strategies that turn EV fleets into grid assets."
  - title: "Smart charging and interoperability"
    body: "Standards, protocols, and utility coordination that make public and private charging reliable at scale."
  - title: "Storage and distribution planning"
    body: "Battery storage, feeder constraints, and distribution modeling for rapid load growth."
  - title: "Power electronics and grid resilience"
    body: "Converters, protection, harmonics, and resilience engineering for electrified infrastructure."
  - title: "Data, AI, and digital twins"
    body: "Forecasting, optimization, anomaly detection, and operational analytics for transport-energy systems."
  - title: "Policy, markets, and equity"
    body: "Tariffs, incentives, congestion, access, and planning decisions that determine who benefits from electrification."
