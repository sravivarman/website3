pages:
  about:
    kicker: "About"
    title: "A conference built for the electrified energy transition"
    summary: |
      ICEVSG 2026 is designed as a working conference for people who need to make vehicle electrification and smart-grid modernization succeed together.

      The goal is not just to present research, but to connect system planners, researchers, and implementers around practical paths forward.
    sections:
      - title: "Conference goals"
        body: |
          ICEVSG 2026 is organized around the question of how transport electrification can scale without overwhelming local infrastructure.

          Sessions will emphasize technical rigor, deployment lessons, and actionable insights for utilities, cities, labs, and industry teams.
      - title: "What the conference covers"
        cards:
          - title: "Grid impact"
            meta: "Topic 1"
            body: "Load growth, distribution constraints, resilience, interconnection, and operational planning."
          - title: "Charging infrastructure"
            meta: "Topic 2"
            body: "Public charging, depot charging, interoperability, reliability, and maintenance."
          - title: "System intelligence"
            meta: "Topic 3"
            body: "Optimization, forecasting, digital twins, and control strategies for active energy management."
      - title: "Who should attend"
        bullets:
          - "Researchers working on electric vehicles, power systems, control, or energy policy."
          - "Utility planners, regulators, and grid operators preparing for rapid EV adoption."
          - "Automakers, charging-network operators, and fleet managers building infrastructure at scale."
          - "Public-sector leaders focused on climate, transportation, and equitable access."
      - title: "Organizing structure"
        cards:
          - title: "Technical program committee"
            meta: "Peer review"
            body: "Responsible for paper review, session balancing, and workshop selection."
          - title: "Local organizing committee"
            meta: "Venue and logistics"
            body: "Handles registration, travel guidance, accessibility, and onsite coordination."
          - title: "Industry advisory board"
            meta: "Deployment feedback"
            body: "Ensures the program reflects practical deployment needs and current industry constraints."
