featured_speakers:
  - name: "Dr. Maya Rodriguez"
    role: "Opening Keynote"
    affiliation: "National Renewable Energy Laboratory"
    talk_title: "When EVs Become Grid Assets"
    bio: |
      Dr. Rodriguez studies managed charging, distribution constraints, and the systems-level effects of large-scale EV adoption.
  - name: "Prof. Daniel Okafor"
    role: "Invited Speaker"
    affiliation: "University of Michigan"
    talk_title: "Distribution Planning for Fast EV Growth"
    bio: |
      Prof. Okafor works on feeder modeling, resilience planning, and electrification strategies for urban and suburban networks.
  - name: "Elena Park"
    role: "Invited Speaker"
    affiliation: "Midwest Clean Transportation Coalition"
    talk_title: "Equity in Charging Access"
    bio: |
      Elena Park focuses on deployment policy, access, and community-centered infrastructure programs.
  - name: "Dr. Ahmed Saleh"
    role: "Tutorial Lead"
    affiliation: "Argonne National Laboratory"
    talk_title: "Digital Twins for Smart Charging"
    bio: |
      Dr. Saleh develops digital twin methods for forecasting, charging orchestration, and operational decision support.
  - name: "Priya Nair"
    role: "Industry Panelist"
    affiliation: "GridPulse Energy"
    talk_title: "Fleet Charging at Commercial Scale"
    bio: |
      Priya Nair leads deployment work for depot charging, energy management, and utility coordination with fleet operators.
