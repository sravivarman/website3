site_name: "International Conference on Electric Vehicles and Smart Grid"
abbrev: "ICEVSG 2026"
hero_title: "International Conference on Electric Vehicles and Smart Grid"
hero_tagline: "Accelerating electrified mobility with resilient, intelligent power systems."
hero_summary: |
  The International Conference on Electric Vehicles and Smart Grid brings together researchers, utilities, automakers, policymakers, and city leaders to align vehicle electrification with power-system resilience.

  Across three days of keynotes, technical sessions, tutorials, and networking, the conference will focus on smart charging, storage, grid flexibility, data-driven operations, and equitable infrastructure planning.
dates: "14-16 October 2026"
